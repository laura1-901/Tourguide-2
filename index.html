<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>YourTourGuide</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#f5f7fb;
color:#333;
}

header{
background:linear-gradient(135deg,#1e3a5f,#3569a8);
color:white;
padding:30px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

header h1{
font-size:2.2rem;
}

header p{
margin-top:10px;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
margin-bottom:20px;
}

label{
display:block;
margin-bottom:8px;
font-weight:bold;
}

select{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
margin-bottom:15px;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:1rem;
margin-right:10px;
}

.primary{
background:#1e3a5f;
color:white;
}

.primary:hover{
background:#294f80;
}

.secondary{
background:#f4b400;
color:black;
}

.secondary:hover{
background:#d89c00;
}

.day{
margin-top:30px;
}

.day h2{
margin-bottom:15px;
color:#1e3a5f;
border-bottom:3px solid #f4b400;
padding-bottom:8px;
}

.activity{
background:white;
padding:15px;
border-left:5px solid #1e3a5f;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.activity h3{
margin-bottom:10px;
}

.info{
margin-top:5px;
}

.route{
background:#eef5ff;
padding:10px;
border-radius:8px;
margin-top:10px;
}

footer{
text-align:center;
padding:20px;
margin-top:30px;
color:#666;
}

@media(max-width:768px){

header h1{
font-size:1.8rem;
}

button{
width:100%;
margin-bottom:10px;
}

}

</style>
</head>

<body>

<header>
<h1>🏔️ YourTourGuide</h1>
<p>Dein persönlicher Reiseplan für Luzern</p>
</header>

<div class="container">

<div class="card">

<label>Anzahl Aufenthaltstage</label>

<select id="days">
<option value="1">1 Tag</option>
<option value="2">2 Tage</option>
<option value="3">3 Tage</option>
<option value="4">4 Tage</option>
<option value="5">5 Tage</option>
</select>

<button class="primary" onclick="generatePlan()">
✨ Reiseplan erstellen
</button>

<button class="secondary" onclick="downloadPDF()">
📄 Als PDF speichern
</button>

</div>

<div id="output"></div>

</div>

<footer>
🚢 Entdecke Luzern mit YourTourGuide
</footer>

<script>

const plans = [

[
{
emoji:"🌉",
name:"Kapellbrücke",
time:"09:00",
price:"Gratis",
transport:"🚶 Zu Fuss",
route:"Hotel → Kapellbrücke (10 Min)",
info:"Das Wahrzeichen von Luzern."
},
{
emoji:"🏛️",
name:"Altstadt",
time:"11:00",
price:"Gratis",
transport:"🚶 Zu Fuss",
route:"Kapellbrücke → Altstadt (5 Min)",
info:"Historische Gassen und Plätze."
},
{
emoji:"🦁",
name:"Löwendenkmal",
time:"14:00",
price:"Gratis",
transport:"🚌 Bus Nr. 1",
route:"Altstadt → Löwendenkmal (10 Min)",
info:"Eines der bekanntesten Denkmäler der Schweiz."
},
{
emoji:"❄️",
name:"Gletschergarten",
time:"16:00",
price:"CHF 22",
transport:"🚶 2 Min",
route:"Löwendenkmal → Gletschergarten",
info:"Spannende Eiszeitgeschichte."
}
],

[
{
emoji:"🚂",
name:"Verkehrshaus",
time:"09:00",
price:"CHF 35",
transport:"🚌 Bus Nr. 6",
route:"Hotel → Verkehrshaus",
info:"Das meistbesuchte Museum der Schweiz."
},
{
emoji:"🏖️",
name:"Lido Luzern",
time:"13:00",
price:"CHF 8",
transport:"🚶 5 Min",
route:"Verkehrshaus → Lido",
info:"Badespass direkt am See."
},
{
emoji:"🚢",
name:"Schifffahrt",
time:"16:00",
price:"CHF 30",
transport:"🚢 Schiff",
route:"Lido → Schiffstation",
info:"Rundfahrt auf dem Vierwaldstättersee."
}
],

[
{
emoji:"🏔️",
name:"Pilatus",
time:"09:00",
price:"CHF 78",
transport:"🚞 Zahnradbahn",
route:"Luzern → Pilatus",
info:"Atemberaubende Aussicht."
},
{
emoji:"🌲",
name:"Fräkmüntegg",
time:"14:00",
price:"Gratis",
transport:"🚡 Seilbahn",
route:"Pilatus → Fräkmüntegg",
info:"Natur und Abenteuer."
}
],

[
{
emoji:"⛰️",
name:"Rigi",
time:"09:00",
price:"CHF 72",
transport:"🚆 Bahn + 🚢 Schiff",
route:"Luzern → Vitznau → Rigi",
info:"Die Königin der Berge."
},
{
emoji:"🏘️",
name:"Vitznau",
time:"15:00",
price:"Gratis",
transport:"🚶",
route:"Rigi → Vitznau",
info:"Charmantes Dorf am See."
}
],

[
{
emoji:"🏰",
name:"Museggmauer",
time:"09:00",
price:"Gratis",
transport:"🚶",
route:"Hotel → Museggmauer",
info:"Historische Stadtmauer."
},
{
emoji:"🎨",
name:"Rosengart Collection",
time:"12:00",
price:"CHF 20",
transport:"🚌 Bus Nr. 2",
route:"Museggmauer → Rosengart",
info:"Werke von Picasso und Klee."
},
{
emoji:"🛍️",
name:"Shopping Altstadt",
time:"15:00",
price:"Individuell",
transport:"🚶",
route:"Rosengart → Altstadt",
info:"Souvenirs und Schweizer Spezialitäten."
}
]

];

function generatePlan(){

const days = Number(document.getElementById("days").value);

let html = "";

for(let d=0; d<days; d++){

html += `<div class="day">
<h2>📅 Tag ${d+1}</h2>`;

plans[d].forEach(place=>{

html += `
<div class="activity">

<h3>${place.emoji} ${place.name}</h3>

<div class="info">🕒 ${place.time}</div>
<div class="info">💰 ${place.price}</div>
<div class="info">${place.transport}</div>

<p style="margin-top:10px;">
${place.info}
</p>

<div class="route">
📍 Route: ${place.route}
</div>

</div>
`;

});

html += `</div>`;
}

document.getElementById("output").innerHTML = html;

}

function downloadPDF(){
window.print();
}

generatePlan();

</script>

</body>
</html>
